<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Password Generator — Easy &amp; Secure</title>
<meta name="description" content="Generate strong, secure passwords instantly. Everything is generated locally in your browser." />
<style>
  /* ------------------------------------------------------------------ */
  /*  Reset & base                                                       */
  /* ------------------------------------------------------------------ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0f0d;
    --card: #111714;
    --panel-from: #16382b;
    --panel-to: #102a21;
    --emerald: #34d399;
    --emerald-soft: rgba(52, 211, 153, 0.15);
    --red: #ef4444;
    --red-hover: #dc2626;
    --white: #ffffff;
    --zinc-400: #a1a1aa;
    --zinc-500: #71717a;
    --border-white-10: rgba(255,255,255,0.1);
    --radius: 1rem;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  html, body { height: 100%; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: #f4f4f5;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Ambient background glow */
  .glow {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
    pointer-events: none;
  }
  .glow::before, .glow::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
  }
  .glow::before {
    width: 28rem; height: 28rem;
    left: 50%; top: -10rem;
    transform: translateX(-50%);
    background: rgba(16, 185, 129, 0.15);
  }
  .glow::after {
    width: 22rem; height: 22rem;
    right: -6rem; bottom: -8rem;
    background: rgba(16, 185, 129, 0.10);
  }

  /* ------------------------------------------------------------------ */
  /*  Layout                                                            */
  /* ------------------------------------------------------------------ */
  main {
    width: 100%;
    max-width: 36rem; /* max-w-xl */
    margin: 0 auto;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 2rem 1rem 4rem; /* pt-8 = 2rem */
  }

  /* Header */
  header { text-align: center; margin-bottom: 2rem; }
  .lock-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 3.5rem; height: 3.5rem;
    margin-bottom: 1rem;
    border-radius: 1rem;
    background: var(--emerald-soft);
    box-shadow: inset 0 0 0 1px rgba(52, 211, 153, 0.3);
  }
  .lock-badge svg { width: 1.75rem; height: 1.75rem; color: var(--emerald); }
  h1 {
    font-size: clamp(1.5rem, 5vw, 1.875rem);
    font-weight: 700;
    letter-spacing: -0.025em;
    color: var(--white);
  }

  /* ------------------------------------------------------------------ */
  /*  Password display card                                             */
  /* ------------------------------------------------------------------ */
  .pwd-card {
    background: var(--card);
    border: 1px solid var(--border-white-10);
    border-radius: var(--radius);
    padding: 1.25rem;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
  }
  .pwd-row {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  @media (min-width: 640px) {
    .pwd-row { flex-direction: row; align-items: stretch; }
  }
  .pwd-display {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex: 1;
    min-width: 0;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 0.75rem;
    padding: 0.75rem 1rem;
  }
  .refresh-btn {
    flex-shrink: 0;
    width: 1.25rem; height: 1.25rem;
    background: none; border: none; cursor: pointer;
    color: #71717a;
    transition: color 0.15s;
    padding: 0;
    display: flex;
  }
  .refresh-btn:hover { color: var(--emerald); }
  .refresh-btn.spinning svg { animation: spin 0.5s ease-in-out; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .pwd-text {
    flex: 1;
    min-width: 0;
    font-family: var(--mono);
    font-size: 1.125rem;
    font-weight: 600;
    color: var(--white);
    word-break: break-all;
    line-height: 1.4;
  }
  @media (min-width: 640px) { .pwd-text { font-size: 1.25rem; } }
  .pwd-text.placeholder { color: #71717a; font-weight: 400; }

  /* Big copy button */
  .copy-btn {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 1rem 1.5rem;
    min-width: 10rem;
    border: none;
    border-radius: 0.75rem;
    background: var(--red);
    color: var(--white);
    font-size: 1rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 10px 25px -5px rgba(127, 29, 29, 0.5);
    transition: background 0.15s, transform 0.05s;
  }
  .copy-btn:hover { background: var(--red-hover); }
  .copy-btn:active { transform: scale(0.98); }
  .copy-btn:disabled { cursor: not-allowed; opacity: 0.4; }
  .copy-btn svg { width: 1.25rem; height: 1.25rem; }

  /* Strength */
  .strength {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-top: 1rem;
  }
  .strength-bar-bg {
    flex: 1;
    height: 0.5rem;
    background: rgba(255,255,255,0.1);
    border-radius: 9999px;
    overflow: hidden;
  }
  .strength-bar-fill {
    height: 100%;
    border-radius: 9999px;
    transition: width 0.5s ease, background 0.3s ease;
    width: 0%;
  }
  .strength-label {
    display: flex;
    align-items: center;
    gap: 0.375rem;
    font-size: 0.875rem;
    font-weight: 600;
    transition: color 0.3s ease;
  }
  .strength-label svg { width: 1rem; height: 1rem; }

  /* ------------------------------------------------------------------ */
  /*  Control panel                                                     */
  /* ------------------------------------------------------------------ */
  .panel {
    margin-top: 1.25rem;
    background: linear-gradient(to bottom, var(--panel-from), var(--panel-to));
    border: 1px solid rgba(6, 78, 59, 0.4);
    border-radius: var(--radius);
    padding: 1.5rem;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
  }

  /* Length */
  .length-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.75rem;
  }
  .length-label {
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--white);
  }
  .length-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 2.5rem;
    height: 1.75rem;
    padding: 0 0.625rem;
    border-radius: 0.5rem;
    background: rgba(52, 211, 153, 0.15);
    color: #6ee7b7;
    font-size: 0.875rem;
    font-weight: 700;
    box-shadow: inset 0 0 0 1px rgba(52, 211, 153, 0.3);
  }

  /* Range slider — styled to match */
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 0.5rem;
    background: rgba(0,0,0,0.5);
    border-radius: 9999px;
    outline: none;
    cursor: pointer;
  }
  /* Filled portion (webkit) */
  input[type="range"]::-webkit-slider-runnable-track {
    height: 0.5rem;
    border-radius: 9999px;
    background: linear-gradient(to right, var(--emerald) 0%, var(--emerald) var(--fill, 50%), rgba(0,0,0,0.5) var(--fill, 50%), rgba(0,0,0,0.5) 100%);
  }
  input[type="range"]::-moz-range-track {
    height: 0.5rem;
    border-radius: 9999px;
    background: rgba(0,0,0,0.5);
  }
  input[type="range"]::-moz-range-progress {
    height: 0.5rem;
    border-radius: 9999px;
    background: var(--emerald);
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 1.25rem; height: 1.25rem;
    margin-top: -0.375rem;
    border-radius: 50%;
    background: var(--emerald);
    border: 1px solid var(--emerald);
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
    cursor: pointer;
    transition: box-shadow 0.15s;
  }
  input[type="range"]::-webkit-slider-thumb:hover {
    box-shadow: 0 0 0 6px rgba(52, 211, 153, 0.25);
  }
  input[type="range"]::-moz-range-thumb {
    width: 1.25rem; height: 1.25rem;
    border-radius: 50%;
    background: var(--emerald);
    border: 1px solid var(--emerald);
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
    cursor: pointer;
  }
  .range-bounds {
    display: flex;
    justify-content: space-between;
    margin-top: 0.5rem;
    font-size: 0.75rem;
    color: rgba(167, 243, 208, 0.5);
  }

  /* Characters used */
  .chars-title {
    margin-top: 1.5rem;
    margin-bottom: 0.75rem;
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--white);
  }
  .chars-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.5rem;
  }
  @media (min-width: 640px) { .chars-grid { grid-template-columns: 1fr 1fr; } }
  .char-option {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    border-radius: 0.75rem;
    border: 1px solid rgba(255,255,255,0.05);
    background: rgba(0,0,0,0.2);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .char-option:hover { border-color: rgba(255,255,255,0.1); }
  .char-option.checked {
    border-color: rgba(52, 211, 153, 0.4);
    background: rgba(52, 211, 153, 0.1);
  }
  .char-option input[type="checkbox"] {
    -webkit-appearance: none;
    appearance: none;
    width: 1.25rem; height: 1.25rem;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.4);
    border-radius: 4px;
    cursor: pointer;
    flex-shrink: 0;
    position: relative;
    transition: all 0.15s;
  }
  .char-option input[type="checkbox"]:checked {
    background: var(--emerald);
    border-color: var(--emerald);
  }
  .char-option input[type="checkbox"]:checked::after {
    content: "";
    position: absolute;
    left: 4px; top: 1px;
    width: 5px; height: 9px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  .char-text { display: flex; flex-direction: column; }
  .char-name { font-size: 0.875rem; font-weight: 500; color: var(--white); }
  .char-hint { font-size: 0.75rem; color: rgba(167, 243, 208, 0.5); }

  /* Security note */
  .security-note {
    margin-top: 1.5rem;
    text-align: center;
    font-size: 0.75rem;
    color: #71717a;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.25rem;
  }
  .security-note svg { width: 0.875rem; height: 0.875rem; color: rgba(16, 185, 129, 0.7); }

  /* ------------------------------------------------------------------ */
  /*  Toast                                                             */
  /* ------------------------------------------------------------------ */
  .toast {
    position: fixed;
    top: 1rem;
    right: 1rem;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
    padding: 1rem 1.25rem;
    border-radius: 0.5rem;
    background: var(--red);
    color: var(--white);
    box-shadow: 0 10px 25px -5px rgba(127, 29, 29, 0.5);
    border: 1px solid rgba(248, 113, 113, 0.4);
    font-size: 0.875rem;
    max-width: 420px;
    transform: translateX(calc(100% + 1rem));
    opacity: 0;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }
  .toast.show { transform: translateX(0); opacity: 1; }
  .toast-title { font-weight: 600; }
  .toast-desc { font-size: 0.75rem; opacity: 0.9; margin-top: 0.125rem; }
  @media (max-width: 640px) {
    .toast { top: auto; bottom: 1rem; right: 1rem; left: 1rem; max-width: none; }
  }

  /* Focus visible accessibility */
  button:focus-visible, input:focus-visible, label:focus-visible {
    outline: 2px solid rgba(52, 211, 153, 0.5);
    outline-offset: 2px;
  }
</style>
</head>
<body>
  <div class="glow" aria-hidden="true"></div>

  <main>
    <header>
      <div class="lock-badge" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h1>Password Generator</h1>
    </header>

    <!-- Password display -->
    <section class="pwd-card" aria-label="Generated password">
      <div class="pwd-row">
        <div class="pwd-display">
          <button class="refresh-btn" id="refreshBtn" aria-label="Generate new password" title="Generate new password">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
              <path d="M21 3v5h-5"/>
              <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
              <path d="M3 21v-5h5"/>
            </svg>
          </button>
          <code class="pwd-text placeholder" id="pwdText" aria-live="polite">Select at least one option…</code>
        </div>

        <button class="copy-btn" id="copyBtn" disabled>
          <svg id="copyIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/>
            <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
          </svg>
          <span id="copyLabel">Copy password</span>
        </button>
      </div>

      <div class="strength">
        <div class="strength-bar-bg">
          <div class="strength-bar-fill" id="strengthBar"></div>
        </div>
        <div class="strength-label" id="strengthLabel">
          <svg id="strengthIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>
          </svg>
          <span id="strengthText">No characters selected</span>
        </div>
      </div>
    </section>

    <!-- Control panel -->
    <section class="panel" aria-label="Password options">
      <div>
        <div class="length-header">
          <label class="length-label" for="lengthSlider">Password Length</label>
          <span class="length-badge" id="lengthBadge">16</span>
        </div>
        <input type="range" id="lengthSlider" min="4" max="32" value="16" step="1" />
        <div class="range-bounds"><span>4</span><span>32</span></div>
      </div>

      <div>
        <h2 class="chars-title">Characters Used</h2>
        <div class="chars-grid" id="charsGrid"><!-- generated by JS --></div>
      </div>
    </section>

    <p class="security-note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>
      </svg>
      Generated with your browser's cryptographic random source. Never reused, never transmitted.
    </p>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite">
    <div>
      <div class="toast-title" id="toastTitle">Password copied</div>
      <div class="toast-desc" id="toastDesc"></div>
    </div>
  </div>

<script>
(function () {
  "use strict";

  /* ---------- Character sets ---------- */
  var CHAR_SETS = {
    uppercase: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
    lowercase: "abcdefghijklmnopqrstuvwxyz",
    numbers: "0123456789",
    symbols: "!@#$%^&*()-_=+[]{};:,.<>?/~"
  };
  var OPTIONS = [
    { key: "uppercase", label: "Uppercase", hint: "A-Z" },
    { key: "lowercase", label: "Lowercase", hint: "a-z" },
    { key: "numbers", label: "Numbers", hint: "0-9" },
    { key: "symbols", label: "Symbols", hint: "!@#$" }
  ];
  var MIN_LENGTH = 4;
  var MAX_LENGTH = 32;

  /* ---------- Secure RNG ---------- */
  function secureRandomInt(max) {
    if (max <= 0) return 0;
    var maxUint32 = 0xffffffff;
    var limit = maxUint32 - (maxUint32 % max);
    var buf = new Uint32Array(1);
    var x = 0;
    do {
      crypto.getRandomValues(buf);
      x = buf[0];
    } while (x >= limit);
    return x % max;
  }

  function generatePassword(length, enabled) {
    if (enabled.length === 0) return "";
    var pool = enabled.map(function (k) { return CHAR_SETS[k]; }).join("");
    var required = enabled.map(function (k) {
      var set = CHAR_SETS[k];
      return set.charAt(secureRandomInt(set.length));
    });
    var chars = required.slice();
    for (var i = chars.length; i < length; i++) {
      chars.push(pool.charAt(secureRandomInt(pool.length)));
    }
    // Fisher-Yates shuffle
    for (var j = chars.length - 1; j > 0; j--) {
      var r = secureRandomInt(j + 1);
      var tmp = chars[j];
      chars[j] = chars[r];
      chars[r] = tmp;
    }
    return chars.slice(0, length).join("");
  }

  /* ---------- Strength ---------- */
  function calcStrength(length, enabled) {
    if (enabled.length === 0 || length === 0) {
      return { label: "No characters selected", percent: 0, color: "#a1a1aa", bar: "#52525b", icon: "alert" };
    }
    var poolSize = enabled.reduce(function (acc, k) { return acc + CHAR_SETS[k].length; }, 0);
    var entropy = length * Math.log2(poolSize);
    if (entropy < 28) return { label: "Very weak", percent: 15, color: "#f87171", bar: "#ef4444", icon: "alert" };
    if (entropy < 40) return { label: "Weak", percent: 32, color: "#fb923c", bar: "#f97316", icon: "alert" };
    if (entropy < 60) return { label: "Fair", percent: 55, color: "#fbbf24", bar: "#f59e0b", icon: "question" };
    if (entropy < 80) return { label: "Good", percent: 75, color: "#a3e635", bar: "#84cc16", icon: "check" };
    if (entropy < 112) return { label: "Strong", percent: 90, color: "#34d399", bar: "#10b981", icon: "check" };
    return { label: "Very strong", percent: 100, color: "#6ee7b7", bar: "#34d399", icon: "check" };
  }

  var ICONS = {
    alert: '<path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/>',
    question: '<circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" x2="12.01" y1="17" y2="17"/>',
    check: '<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>'
  };

  /* ---------- State ---------- */
  var state = {
    length: 16,
    enabled: { uppercase: true, lowercase: true, numbers: true, symbols: true }
  };

  /* ---------- DOM refs ---------- */
  var pwdText = document.getElementById("pwdText");
  var refreshBtn = document.getElementById("refreshBtn");
  var copyBtn = document.getElementById("copyBtn");
  var copyIcon = document.getElementById("copyIcon");
  var copyLabel = document.getElementById("copyLabel");
  var lengthSlider = document.getElementById("lengthSlider");
  var lengthBadge = document.getElementById("lengthBadge");
  var charsGrid = document.getElementById("charsGrid");
  var strengthBar = document.getElementById("strengthBar");
  var strengthText = document.getElementById("strengthText");
  var strengthLabel = document.getElementById("strengthLabel");
  var strengthIcon = document.getElementById("strengthIcon");
  var toast = document.getElementById("toast");
  var toastTitle = document.getElementById("toastTitle");
  var toastDesc = document.getElementById("toastDesc");
  var toastTimer = null;

  /* ---------- Build checkboxes ---------- */
  OPTIONS.forEach(function (opt) {
    var label = document.createElement("label");
    label.className = "char-option checked";
    label.htmlFor = "opt-" + opt.key;
    label.setAttribute("tabindex", "0");

    var input = document.createElement("input");
    input.type = "checkbox";
    input.id = "opt-" + opt.key;
    input.checked = true;

    var textWrap = document.createElement("span");
    textWrap.className = "char-text";
    var name = document.createElement("span");
    name.className = "char-name";
    name.textContent = opt.label;
    var hint = document.createElement("span");
    hint.className = "char-hint";
    hint.textContent = opt.hint;
    textWrap.appendChild(name);
    textWrap.appendChild(hint);

    label.appendChild(input);
    label.appendChild(textWrap);
    charsGrid.appendChild(label);

    function toggle() {
      // Don't allow turning off the last one
      var anyOn = OPTIONS.some(function (o) {
        if (o.key === opt.key) return !input.checked; // new state
        return document.getElementById("opt-" + o.key).checked;
      });
      if (!anyOn) {
        input.checked = true; // force back on
        return;
      }
      input.checked = !input.checked;
      state.enabled[opt.key] = input.checked;
      label.classList.toggle("checked", input.checked);
      render();
    }

    label.addEventListener("click", function (e) {
      if (e.target === input) return; // let checkbox handle, then sync
      e.preventDefault();
      toggle();
    });
    input.addEventListener("change", function () {
      // sync from direct checkbox click
      var anyOn = OPTIONS.some(function (o) {
        return document.getElementById("opt-" + o.key).checked;
      });
      if (!anyOn) {
        input.checked = true;
        return;
      }
      state.enabled[opt.key] = input.checked;
      label.classList.toggle("checked", input.checked);
      render();
    });
  });

  /* ---------- Slider ---------- */
  function updateSliderFill() {
    var pct = ((state.length - MIN_LENGTH) / (MAX_LENGTH - MIN_LENGTH)) * 100;
    lengthSlider.style.setProperty("--fill", pct + "%");
  }
  lengthSlider.addEventListener("input", function () {
    state.length = parseInt(lengthSlider.value, 10);
    lengthBadge.textContent = state.length;
    updateSliderFill();
    render(true);
  });

  /* ---------- Refresh ---------- */
  var spinning = false;
  function regenerate() {
    spinning = true;
    refreshBtn.classList.add("spinning");
    setTimeout(function () { refreshBtn.classList.remove("spinning"); }, 500);
    render(true);
  }
  refreshBtn.addEventListener("click", regenerate);

  /* ---------- Copy ---------- */
  var currentPassword = "";
  var copied = false;
  var copyResetTimer = null;

  function showToast(title, desc) {
    toastTitle.textContent = title;
    toastDesc.textContent = desc;
    toast.classList.add("show");
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toast.classList.remove("show"); }, 3000);
  }

  copyBtn.addEventListener("click", function () {
    if (!currentPassword) return;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(currentPassword).then(function () {
        onCopied();
      }).catch(function () {
        fallbackCopy(currentPassword);
      });
    } else {
      fallbackCopy(currentPassword);
    }
  });

  function fallbackCopy(text) {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); onCopied(); }
    catch (e) { showToast("Could not copy", "Your browser blocked clipboard access."); }
    document.body.removeChild(ta);
  }

  function onCopied() {
    copied = true;
    copyIcon.innerHTML = '<polyline points="20 6 9 17 4 12"/>';
    copyLabel.textContent = "Copied!";
    showToast("Password copied", currentPassword.length + " characters copied to your clipboard.");
    if (copyResetTimer) clearTimeout(copyResetTimer);
    copyResetTimer = setTimeout(function () {
      copied = false;
      copyIcon.innerHTML = '<rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>';
      copyLabel.textContent = "Copy password";
    }, 2000);
  }

  /* ---------- Render ---------- */
  function render(regen) {
    var enabledKeys = OPTIONS.filter(function (o) { return state.enabled[o.key]; }).map(function (o) { return o.key; });
    var s = calcStrength(state.length, enabledKeys);
    strengthBar.style.width = s.percent + "%";
    strengthBar.style.background = s.bar;
    strengthText.textContent = s.label;
    strengthLabel.style.color = s.color;
    strengthIcon.innerHTML = ICONS[s.icon];

    if (enabledKeys.length === 0) {
      currentPassword = "";
      pwdText.textContent = "Select at least one option…";
      pwdText.classList.add("placeholder");
      copyBtn.disabled = true;
      return;
    }
    if (regen || !currentPassword) {
      currentPassword = generatePassword(state.length, enabledKeys);
      // reset copy label if regenerating
      if (copied) {
        copied = false;
        copyIcon.innerHTML = '<rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>';
        copyLabel.textContent = "Copy password";
      }
    }
    pwdText.textContent = currentPassword;
    pwdText.classList.remove("placeholder");
    copyBtn.disabled = false;
  }

  /* ---------- Init ---------- */
  updateSliderFill();
  render(true);
})();
</script>
</body>
</html>
